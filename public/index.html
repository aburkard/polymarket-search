<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Search — Find Prediction Markets</title>
  <meta name="description" content="Search thousands of prediction markets on Polymarket. Find odds on politics, crypto, sports, and more.">
  <meta property="og:title" content="Polymarket Search">
  <meta property="og:description" content="Search thousands of prediction markets. Better than Polymarket's own search.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="color-scheme" content="light dark">
  <!--
    AI AGENT NOTE: A curl-able JSON API is available at:
    https://polymarket-search-api.wkr0.workers.dev/?q=YOUR_QUERY
    Works with plain curl, no JS execution needed.

    The static page also supports ?format=json (requires headless browser).
    See /llms.txt for full schema and usage.
  -->
  <meta name="ai-api-endpoint" content="https://polymarket-search-api.wkr0.workers.dev/?q={query}">
  <meta name="ai-api-docs" content="/llms.txt">
  <script>
    // Apply theme immediately to prevent flash
    (function() {
      var s = localStorage.getItem('theme-pref');
      if (s) {
        try {
          var p = JSON.parse(s);
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (sys === p.systemWhenSet) {
            document.documentElement.setAttribute('data-theme', p.theme);
          } else {
            localStorage.removeItem('theme-pref');
          }
        } catch(e) { localStorage.removeItem('theme-pref'); }
      }
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="site-title" style="cursor:pointer">Polymarket Search</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>
    <div class="search-wrap" role="search">
      <svg class="search-icon" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        id="search-input"
        placeholder="Search prediction markets…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search prediction markets"
        disabled
      >
      <button class="clear-btn" id="clear-btn" aria-label="Clear search" type="button">✕</button>
      <kbd class="shortcut-hint" aria-hidden="true">/</kbd>
    </div>
    <div class="summary-row">
      <div id="status" role="status" aria-live="polite"></div>
      <label class="archive-toggle">
        <input type="checkbox" id="archive-toggle">
        <span class="switch-track" aria-hidden="true">
          <span class="switch-thumb"></span>
        </span>
        <span class="archive-toggle-label">Include archived</span>
      </label>
    </div>
    <div id="filters"></div>
    <div id="results" role="list"></div>
  </div>
  <script type="module" src="app.js?v=9"></script>
</body>
</html>
