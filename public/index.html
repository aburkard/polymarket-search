<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Search — Find Prediction Markets</title>
  <meta name="description" content="Search thousands of prediction markets on Polymarket. Find odds on politics, crypto, sports, and more.">
  <meta property="og:title" content="Polymarket Search">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Polymarket Search</h1>

      type="text"
      id="search-input"
      placeholder="Search prediction markets…"
      autocomplete="off"
      spellcheck="false"
      disabled

    <div id="status"></div>
    <div id="results"></div>
  </div>
  <script type="module" src="app.js"></script>
