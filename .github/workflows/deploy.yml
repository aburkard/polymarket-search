name: Build and Deploy

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_enrichment:
        description: 'Run LLM enrichment during this deploy'
        required: false
        type: boolean
        default: false
      enrichment_limit:
        description: 'Max events to enrich per provider'
        required: false
        type: number
        default: 100

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      HAS_API_KEY: ${{ secrets.OPENROUTER_API_KEY != '' }}
      RUN_ENRICHMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.run_enrichment }}
      ENRICHMENT_LIMIT: ${{ inputs.enrichment_limit || 100 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore Kalshi metadata cache
        uses: actions/cache/restore@v4
        with:
          path: data/kalshi_event_metadata_open.jsonl
          key: kalshi-metadata-${{ github.run_id }}
          restore-keys: |
            kalshi-metadata-

      - name: Fetch data and build index
        run: python scripts/build-index.py

      - name: Enrich new events
        if: env.HAS_API_KEY == 'true' && env.RUN_ENRICHMENT == 'true'
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/enrich.py --limit "$ENRICHMENT_LIMIT"

      - name: Build Kalshi index
        run: python scripts/build-kalshi-index.py --skip-metadata

      - name: Enrich new Kalshi events
        if: env.HAS_API_KEY == 'true' && env.RUN_ENRICHMENT == 'true'
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/enrich.py --provider kalshi --limit "$ENRICHMENT_LIMIT"

      - name: Commit enrichments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/enrichments.jsonl
          git add -f data/kalshi_enrichments.jsonl
          if git diff --staged --quiet; then
            echo "No new enrichments"
          else
            git commit -m "Update enrichments [skip ci]"
            git push
          fi

      - name: Rebuild index with enrichments
        run: python scripts/build-index.py

      - name: Build archived index
        run: python scripts/build-index.py --archived

      - name: Rebuild Kalshi index with enrichments
        run: python scripts/build-kalshi-index.py

      - name: Save Kalshi metadata cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/kalshi_event_metadata_open.jsonl
          key: kalshi-metadata-${{ github.run_id }}

      - name: Optimize index size
        run: python scripts/optimize_index.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
