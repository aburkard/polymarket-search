name: Build and Deploy

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      HAS_API_KEY: ${{ secrets.OPENROUTER_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch data and build index
        run: python scripts/build-index.py

      - name: Enrich new events
        if: env.HAS_API_KEY == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/enrich.py --limit 100

      - name: Build Kalshi index
        run: python scripts/build-kalshi-index.py

      - name: Enrich new Kalshi events
        if: env.HAS_API_KEY == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/enrich.py --provider kalshi --limit 100

      - name: Commit enrichments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/enrichments.jsonl
          git add -f data/kalshi_enrichments.jsonl
          if git diff --staged --quiet; then
            echo "No new enrichments"
          else
            git commit -m "Update enrichments [skip ci]"
            git push
          fi

      - name: Rebuild index with enrichments
        run: python scripts/build-index.py

      - name: Build archived index
        run: python scripts/build-index.py --archived

      - name: Rebuild Kalshi index with enrichments
        run: python scripts/build-kalshi-index.py

      - name: Optimize index size
        run: python scripts/optimize_index.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
